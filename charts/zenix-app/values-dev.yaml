# Zenix App — Espace Client (DEV, namespace zenix-app-dev, branche develop)
# Utilisé par l'Application ArgoCD "zenix-app-dev" (argocd/zenix-app-dev.yaml)
# Les images :dev sont pinnées par digest par la CI à chaque push sur develop
#
# SealedSecret Dev : depuis la racine du repo :
#   kubeseal --format yaml --cert pub-cert.pem --scope namespace-wide `
#     --namespace zenix-app-dev < charts/zenix-app/secrets/zenix-app-secrets.yaml
# Copie le bloc spec.encryptedData de la sortie et colle-le sous
# sealedSecretDev.encryptedData ci-dessous.
# ⚠️ Pense à adapter le plain avant (clés Stripe TEST, URLs dev) puis remets-le.

namespace: zenix-app-dev
hostname: appdev.zenixweb.fr

imagePullSecrets:
  - name: ghcr-secret

ingress:
  entryPoints:
    - web
  crowdsec: true

sealedSecretDev:
  encryptedData: {}

# ── Backend (Node.js) ─────────────────────────────────────────────────────────
backend:
  # Pinnée par la CI (branche develop)
  image: ghcr.io/emmguardia/zenix-app-back@sha256:a29196be348166c639b85cc1d43b7d369170b8710a37e1c81c974f3e83bcd2eb
  imagePullPolicy: Always
  replicas: 1
  strategy:
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  port: 3000
  secretName: zenix-app-secrets
  env:
    PORT: "3000"
    NODE_ENV: development
    APP_URL: https://appdev.zenixweb.fr
    FRONTEND_URL: https://appdev.zenixweb.fr
    ADMIN_GROUP: GRP Admins
    STRIPE_PRICE_START: ""
    STRIPE_PRICE_RELAX: ""
    STRIPE_PRICE_PRO: ""
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "384Mi"
  hpa:
    enabled: false   # Pas d'HPA en dev

# ── Frontend (nginx unprivileged) ─────────────────────────────────────────────
frontend:
  image: ghcr.io/emmguardia/zenix-app-front@sha256:071c586e9b593cc9f7e203e366f8c686a688a9d404fd4de7e176096c361146e3
  imagePullPolicy: Always
  replicas: 1
  strategy:
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  port: 8080
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
  hpa:
    enabled: false   # Pas d'HPA en dev
