{{- /* SealedSecret uniquement en prod : en dev, encryptedData vit dans values-dev.yaml. */}}
{{- if eq .Release.Namespace "zenix-app" }}
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  annotations:
    sealedsecrets.bitnami.com/namespace-wide: "true"
  creationTimestamp: null
  name: zenix-app-secrets
  namespace: zenix-app
spec:
  encryptedData:
    db-host: 
    db-name: 
    db-password: 
    db-user: 
    discord-webhook-url: 
    oidc-client-id: 
    oidc-client-secret: 
    oidc-issuer-url: 
    r2-access-key-id: 
    r2-bucket: 
    r2-endpoint: 
    r2-secret-access-key: 
    session-secret: 
    stripe-secret-key: 
    stripe-webhook-secret: 
  template:
    metadata:
      annotations:
        sealedsecrets.bitnami.com/namespace-wide: "true"
      creationTimestamp: null
      labels:
        app.kubernetes.io/part-of: ZenixApp
      name: zenix-app-secrets
      namespace: zenix-app
    type: Opaque
{{- end }}
