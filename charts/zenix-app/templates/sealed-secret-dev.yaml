{{- /* SealedSecret pour Dev : encryptedData collé dans values-dev.yaml (cf. commentaire du fichier) */}}
{{- if and (eq .Release.Namespace "zenix-app-dev") (index (index .Values "sealedSecretDev" "encryptedData" | default dict) "db-password") }}
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  annotations:
    sealedsecrets.bitnami.com/namespace-wide: "true"
  name: zenix-app-secrets
  namespace: zenix-app-dev
spec:
  encryptedData:
    {{- toYaml (index .Values "sealedSecretDev" "encryptedData") | nindent 4 }}
  template:
    metadata:
      name: zenix-app-secrets
      namespace: zenix-app-dev
    type: Opaque
{{- end }}
