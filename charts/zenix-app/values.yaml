# Zenix App — Espace Client (PROD, namespace zenix-app, branche main)
# Les images sont pinnées par digest par la CI (build-and-push.yml)

namespace: zenix-app
hostname: app.zenixweb.fr

imagePullSecrets:
  - name: ghcr-secret

ingress:
  entryPoints:
    - web
  crowdsec: true

# ── Backend (Node.js) ─────────────────────────────────────────────────────────
backend:
  # Pinnée par la CI après le premier build
  image: ghcr.io/emmguardia/zenix-app-back@sha256:01857b1f955b4ccad92c1d3aaab879b18c6592ce89f3fa75d773a9883ce59f5a
  imagePullPolicy: IfNotPresent
  replicas: 1
  strategy:
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  port: 3000
  secretName: zenix-app-secrets
  env:
    PORT: "3000"
    NODE_ENV: production
    APP_URL: https://app.zenixweb.fr
    FRONTEND_URL: https://app.zenixweb.fr
    ADMIN_GROUP: GRP Admins
    # IDs des Prices Stripe (mode LIVE)
    STRIPE_PRICE_START: "price_1TqcGIFPffgTXsMQMRBPhcJc"
    STRIPE_PRICE_RELAX: "price_1TqcJSFPffgTXsMQJ9qWUv1F"
    STRIPE_PRICE_PRO: "price_1Tv5AJFPffgTXsMQVyJRm4Nq"
    # Grille Asso (tarifs réduits)
    STRIPE_PRICE_ESSENTIEL_ASSO: "price_1Tv5BuFPffgTXsMQ4e7usEVJ"
    STRIPE_PRICE_START_ASSO: "price_1TqcGIFPffgTXsMQRB4KMjM5"
    STRIPE_PRICE_RELAX_ASSO: "price_1TqcK0FPffgTXsMQk4ThYha8"
    STRIPE_PRICE_PRO_ASSO: "price_1Tv5AiFPffgTXsMQVwsNOXCA"
    # Coupon 100% "une fois" appliqué automatiquement au 11e paiement (engagement 1 an)
    STRIPE_COUPON_FREE_MONTH: "zenix-12e-mois-offert"
    # Emails transactionnels (email-service du cluster) — strict nécessaire uniquement
    EMAIL_SERVICE_URL: "http://email-service.email-service.svc.cluster.local:8080"
    EMAIL_TEMPLATE_ID: "zenix-app-notification"
    # Clé publique Stripe (pk_live_... — PAS un secret, Dashboard → Clés API)
    STRIPE_PUBLISHABLE_KEY: "pk_live_51RGyN2FPffgTXsMQQkWlcAkD64k3JTXfyKFdoJuGT6LyXjb626u7ewUHqnQXM4TW5HsZh08jOAztpvcDkJjSI4J200whQW8byD"
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "384Mi"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    cpuTarget: 70
    memoryTarget: 80

# ── Frontend (nginx unprivileged) ─────────────────────────────────────────────
frontend:
  # Pinnée par la CI après le premier build
  image: ghcr.io/emmguardia/zenix-app-front@sha256:ff63d8ab824159a673c2fb09c2a192a4b2a6aa8c53534ee366bb02af5f0d7c23
  imagePullPolicy: IfNotPresent
  replicas: 1
  strategy:
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  port: 8080
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    cpuTarget: 70
    memoryTarget: 80
