# Zenix App — Espace Client (PROD, namespace zenix-app, branche main)
# Les images sont pinnées par digest par la CI (build-and-push.yml)

namespace: zenix-app
hostname: app.zenixweb.fr

imagePullSecrets:
  - name: ghcr-secret

ingress:
  entryPoints:
    - web
  crowdsec: true

# ── Backend (Node.js) ─────────────────────────────────────────────────────────
backend:
  # Pinnée par la CI après le premier build
  image: ghcr.io/emmguardia/zenix-app-back@sha256:e4e9c2ee53aad009bd26f260e0ef0c2b434005960b7e263b2f7c89a3697f9e61
  imagePullPolicy: IfNotPresent
  replicas: 1
  strategy:
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  port: 3000
  secretName: zenix-app-secrets
  env:
    PORT: "3000"
    NODE_ENV: production
    APP_URL: https://app.zenixweb.fr
    FRONTEND_URL: https://app.zenixweb.fr
    ADMIN_GROUP: GRP Admins
    # IDs des Prices Stripe (mode test — à remplacer par les live au lancement)
    STRIPE_PRICE_START: "price_1Tpq762XjKwHiB5JkXxsindK"
    STRIPE_PRICE_RELAX: "price_1Tpq762XjKwHiB5JBdNkQyDz"
    STRIPE_PRICE_PRO: "price_1Tpq762XjKwHiB5JHiz1C7GQ"
    # Clé publique Stripe (pk_test_... — PAS un secret, Dashboard → Clés API)
    STRIPE_PUBLISHABLE_KEY: "pk_test_51RGyw32XjKwHiB5J1a4wvTeBhIrgbiyPQUdLJtV4ZMdwh1VdIJMJcgv4UT2roHeixiHxaEdFCxt4XfvcJsJtTWSh00GQTr1ooF"
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "384Mi"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    cpuTarget: 70
    memoryTarget: 80

# ── Frontend (nginx unprivileged) ─────────────────────────────────────────────
frontend:
  # Pinnée par la CI après le premier build
  image: ghcr.io/emmguardia/zenix-app-front@sha256:1bb97e32e7c9a52f2f5dad42c610f91deceddaa94120c2c8935102e8d3adbc3e
  imagePullPolicy: IfNotPresent
  replicas: 1
  strategy:
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  port: 8080
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    cpuTarget: 70
    memoryTarget: 80
