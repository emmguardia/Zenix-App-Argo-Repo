# Zenix App — Espace Client (PROD, namespace zenix-app, branche main)
# Les images sont pinnées par digest par la CI (build-and-push.yml)

namespace: zenix-app
hostname: app.zenixweb.fr

imagePullSecrets:
  - name: ghcr-secret

ingress:
  entryPoints:
    - web
  crowdsec: true

# ── Backend (Node.js) ─────────────────────────────────────────────────────────
backend:
  # Pinnée par la CI après le premier build
  image: ghcr.io/emmguardia/zenix-app-back@sha256:99252214230939afd378fa11f0cae8d31025595cb703c955d036df0c3560d373
  imagePullPolicy: IfNotPresent
  replicas: 1
  strategy:
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  port: 3000
  secretName: zenix-app-secrets
  env:
    PORT: "3000"
    NODE_ENV: production
    APP_URL: https://app.zenixweb.fr
    FRONTEND_URL: https://app.zenixweb.fr
    ADMIN_GROUP: GRP Admins
    # IDs des Prices Stripe (mode test — à remplacer par les live au lancement)
    STRIPE_PRICE_START: "price_1Tpq762XjKwHiB5JkXxsindK"
    STRIPE_PRICE_RELAX: "price_1Tpq762XjKwHiB5JBdNkQyDz"
    STRIPE_PRICE_PRO: "price_1Tpq762XjKwHiB5JHiz1C7GQ"
    # Grille Asso (tarifs réduits)
    STRIPE_PRICE_ESSENTIEL_ASSO: "price_1Tr20j2XjKwHiB5JBGuGkFfs"
    STRIPE_PRICE_START_ASSO: "price_1TpwJ12XjKwHiB5JZ8jR02UV"
    STRIPE_PRICE_RELAX_ASSO: "price_1TpwJ12XjKwHiB5JQOhL2pRz"
    STRIPE_PRICE_PRO_ASSO: "price_1TpwJ22XjKwHiB5JEIjnFgSc"
    # Coupon 100% "une fois" appliqué automatiquement au 11e paiement (engagement 1 an)
    STRIPE_COUPON_FREE_MONTH: "zenix-12e-mois-offert"
    # Emails transactionnels (email-service du cluster) — strict nécessaire uniquement
    EMAIL_SERVICE_URL: "http://email-service.email-service.svc.cluster.local:8080"
    EMAIL_TEMPLATE_ID: "zenix-app-notification"
    # Clé publique Stripe (pk_test_... — PAS un secret, Dashboard → Clés API)
    STRIPE_PUBLISHABLE_KEY: "pk_test_51RGyw32XjKwHiB5J1a4wvTeBhIrgbiyPQUdLJtV4ZMdwh1VdIJMJcgv4UT2roHeixiHxaEdFCxt4XfvcJsJtTWSh00GQTr1ooF"
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "384Mi"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    cpuTarget: 70
    memoryTarget: 80

# ── Frontend (nginx unprivileged) ─────────────────────────────────────────────
frontend:
  # Pinnée par la CI après le premier build
  image: ghcr.io/emmguardia/zenix-app-front@sha256:70ee887e3365289fadb035bad6c0f95461ad95d343a75c58ec0255d9b4fc9f63
  imagePullPolicy: IfNotPresent
  replicas: 1
  strategy:
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  port: 8080
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    cpuTarget: 70
    memoryTarget: 80
