# Application ArgoCD — DEV
# À appliquer : kubectl apply -f argocd/zenix-app-dev.yaml -n argocd
#
# IMPORTANT : targetRevision: develop et valueFiles: values-dev.yaml
# Sans ça, l'app utilise values.yaml (prod) et les images de prod !
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zenix-app-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/emmguardia/Zenix-App-Argo-Repo
    targetRevision: develop
    path: charts/zenix-app
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: zenix-app-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
