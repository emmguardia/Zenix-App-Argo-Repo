# Build and push: main → version + digest (prod)
# ArgoCD: App = branche main + namespace zenix-app

name: Build and push to GHCR

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  TRIVY_IMAGE: aquasec/trivy:0.69.3

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: build-and-push-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            Backend/package-lock.json
            Frontend/package-lock.json

      - name: Backend – install
        run: cd Backend && npm ci

      - name: Backend – audit (moderate+)
        run: cd Backend && npm audit --audit-level=moderate

      - name: Backend – test (if present)
        run: cd Backend && npm run test --if-present

      - name: Frontend – install
        run: cd Frontend && npm ci

      - name: Frontend – audit (moderate+)
        run: cd Frontend && npm audit --audit-level=moderate

      - name: Frontend – build (type-check + bundle)
        run: cd Frontend && npm run build

  build-and-push:
    name: Build and push
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag (version bump)
        id: tag
        run: |
          CONTENT=$(cat version.txt | tr -d '\r\n ')
          MAJOR=$(echo "$CONTENT" | cut -d. -f1)
          MINOR=$(echo "$CONTENT" | cut -d. -f2)
          PATCH=$(echo "$CONTENT" | cut -d. -f3)
          if ! [[ "$MAJOR" =~ ^[0-9]+$ ]] || ! [[ "$MINOR" =~ ^[0-9]+$ ]] || ! [[ "$PATCH" =~ ^[0-9]+$ ]]; then
            echo "version.txt invalide: $CONTENT (attendu X.Y.Z)"
            exit 1
          fi
          if [ "$PATCH" -lt 9 ]; then
            PATCH=$((PATCH + 1))
          else
            PATCH=0
            MINOR=$((MINOR + 1))
          fi
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "$NEW_VERSION" > version.txt
          TAG="v${NEW_VERSION}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Tag: $TAG"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/zenix-app-back
          tags: |
            type=raw,value=${{ steps.tag.outputs.tag }}

      - name: Build and push backend
        id: build-backend
        uses: docker/build-push-action@v7
        with:
          context: ./Backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          no-cache: true
          pull: true

      - name: Trivy scan (backend)
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm -e TRIVY_USERNAME -e TRIVY_PASSWORD \
            ${{ env.TRIVY_IMAGE }} image --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed --format table \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/zenix-app-back:${{ steps.tag.outputs.tag }}

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/zenix-app-front
          tags: |
            type=raw,value=${{ steps.tag.outputs.tag }}

      - name: Build and push frontend
        id: build-frontend
        uses: docker/build-push-action@v7
        with:
          context: ./Frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          no-cache: true
          pull: true

      - name: Trivy scan (frontend)
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm -e TRIVY_USERNAME -e TRIVY_PASSWORD \
            ${{ env.TRIVY_IMAGE }} image --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed --format table \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/zenix-app-front:${{ steps.tag.outputs.tag }}

      # Piner les images par digest pour qu'ArgoCD détecte le changement et déploie
      - name: Pin Helm values to image digest
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          DIGEST_BACKEND="${{ steps.build-backend.outputs.digest }}"
          DIGEST_FRONTEND="${{ steps.build-frontend.outputs.digest }}"
          OWNER="${{ github.repository_owner }}"
          REG="${{ env.REGISTRY }}"

          if [ -n "$DIGEST_BACKEND" ]; then
            BACKEND_IMAGE="${REG}/${OWNER}/zenix-app-back@${DIGEST_BACKEND}"
          else
            BACKEND_IMAGE="${REG}/${OWNER}/zenix-app-back:${TAG}"
          fi
          if [ -n "$DIGEST_FRONTEND" ]; then
            FRONTEND_IMAGE="${REG}/${OWNER}/zenix-app-front@${DIGEST_FRONTEND}"
          else
            FRONTEND_IMAGE="${REG}/${OWNER}/zenix-app-front:${TAG}"
          fi

          VALUES_PATH="charts/zenix-app/values.yaml"
          sed -i "s|  image: ghcr.io/.*zenix-app-back.*|  image: ${BACKEND_IMAGE}|" "$VALUES_PATH"
          sed -i "s|  image: ghcr.io/.*zenix-app-front.*|  image: ${FRONTEND_IMAGE}|" "$VALUES_PATH"

          # appVersion du chart aligné sur la version applicative
          CHART_PATH="charts/zenix-app/Chart.yaml"
          sed -i "s|^appVersion:.*|appVersion: \"${TAG#v}\"|" "$CHART_PATH"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt "$VALUES_PATH" "$CHART_PATH"

          if git diff --staged --quiet; then
            echo "Helm values already up to date, skip commit"
          else
            git commit -m "chore(helm): pin images to digest $TAG [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin ${{ github.ref_name }}
          fi
